name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -name "package.json" -o -name "package-lock.json"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --run
        continue-on-error: true

      - name: Build web/mobile app
        run: |
          npm run build
          npm run build --workspace @aegis/mobile
          test -f apps/mobile/dist/index.html

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Add Android platform if missing
        run: |
          if [ ! -d "apps/mobile/android" ]; then
            cd apps/mobile
            npx cap add android
          fi

      - name: Sync Capacitor
        run: |
          cd apps/mobile
          npx cap sync android

      - name: Make Gradle executable
        run: chmod +x apps/mobile/android/gradlew

      - name: Build debug APK
        run: |
          cd apps/mobile/android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-trade-ai-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
